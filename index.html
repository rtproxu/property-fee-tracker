<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#4F46E5;--primary-bg:#EEF2FF;--bg:#F5F5F7;--card:#FFF;--text:#1D1D1F;--text2:#86868B;--border:#E5E5EA;--radius:14px;--safe-bottom:env(safe-area-inset-bottom,0px)}

.btn{height:50px;padding:0 24px;border-radius:10px;font-size:16px;font-weight:500;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}

<script>
window.onerror=function(m,u,l,c,e){var t=document.getElementById("toast");if(t){t.textContent="JS错误: "+m+" (行"+l+")";t.className="ts show"}document.getElementById("header").textContent="物业记账 ⚠️";console.error("window error",m,u,l,c,e)};
var DBN="PropertyFeeDB",DBV=4,ST="recs4";
function od(){return new Promise(function(o,f){var r=indexedDB.open(DBN,DBV);r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(ST))d.createObjectStore(ST,{keyPath:"id",autoIncrement:true})};r.onsuccess=function(e){o(e.target.result)};r.onerror=function(e){f(e.target.error)}})}
function da(r){return od().then(function(d){return new Promise(function(o,f){var t=d.transaction(ST,"readwrite");t.objectStore(ST).add(r);t.oncomplete=function(){o()};t.onerror=function(e){f(e.target.error)}})})}
function db(rs){return od().then(function(d){return new Promise(function(o,f){var t=d.transaction(ST,"readwrite"),s=t.objectStore(ST);rs.forEach(function(r){s.add(r)});t.oncomplete=function(){o()};t.onerror=function(e){f(e.target.error)}})})}
function dg(){return od().then(function(d){return new Promise(function(o,f){var t=d.transaction(ST,"readonly");t.onerror=function(e){f(e.target.error)};t.objectStore(ST).getAll().onsuccess=function(e){o(e.target.result)}})})}
function dp(r){return od().then(function(d){return new Promise(function(o,f){var t=d.transaction(ST,"readwrite");t.onerror=function(e){f(e.target.error)};t.objectStore(ST).put(r);t.oncomplete=function(){o()}})})}
function dd(id){return od().then(function(d){return new Promise(function(o,f){var t=d.transaction(ST,"readwrite");t.onerror=function(e){f(e.target.error)};t.objectStore(ST).delete(id);t.oncomplete=function(){o()}})})}
function dc(){return od().then(function(d){return new Promise(function(o,f){var t=d.transaction(ST,"readonly");t.onerror=function(e){f(e.target.error)};t.objectStore(ST).count().onsuccess=function(e){o(e.target.result)}})})}
function dlr(){return od().then(function(d){return new Promise(function(o,f){var t=d.transaction(ST,"readwrite");t.onerror=function(e){f(e.target.error)};t.objectStore(ST).clear();t.oncomplete=function(){o()}})})}

var DT=["物业费","水费","电费","燃气费","停车费","垃圾费","装修保证金","维修基金","售后房管理费","其他"];

function y2(v){return(parseFloat(v)||0).toFixed(2)}
function es(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
var PR=[],AR=[],FR=[],SF="全部",EI=null,TT=0;

var LB=[{k:["小区"],f:"cm"},{k:["地址"],f:"_ad"},{k:["日期/时间","日期"],f:"dt"},{k:["账单日期","账单期间"],f:"_bl"},{k:["费用类型"],f:"ft"},{k:["交易金额","金额"],f:"_am"},{k:["支付方式"],f:"pm"},{k:["交易确认签名","备注"],f:"no"},{k:["收费员"],f:"cl"}];
function mL(l){var c=l.trim().replace(/\s*\([A-Z\s]+\)\s*$/,"");for(var i=0;i<LB.length;i++){var L=LB[i];for(var j=0;j<L.k.length;j++){var k=L.k[j];if(c===k)return L;if(c.indexOf(k)===0){var nxt=c.charAt(k.length);if(nxt==":"||nxt=="："||nxt===" "||nxt==="(")return L}var idx=c.indexOf(k);if(idx>0){var pre=c.charAt(idx-1),nxt=c.charAt(idx+k.length);if((pre===" "||pre==="	"||pre===""||pre==="-"||pre==="—"||pre==="/")&&(nxt==":"||nxt=="："||nxt===" "||nxt==="("||nxt===""))return L}}}return null}
function pA(a){if(!a)return{u:"",n:""};var p=a,n="",i=a.indexOf("_*");if(i>=0){p=a.slice(0,i);n=a.slice(i+2)}var j=a.indexOf("*");if(j>=0&&i<0){p=a.slice(0,j);n=a.slice(j+1)}p=p.trim();n=n.trim();var labels=["地址","日期","日期/时间","账单日期","账单期间","费用类型","交易金额","金额","支付方式","交易确认签名","备注","收费员","小区"];for(var k=0;k<labels.length;k++){var idx=n.indexOf(labels[k]);if(idx>0){n=n.slice(0,idx).trim();break}}var m=p.match(/^(.+?)(\d+[号栋幢号楼].*)$/);if(m)return{c:m[1].trim(),u:m[2].trim(),n:n};return{c:"",u:p,n:n}}
function pB(r){var m;m=r.match(/(\d{4})年\s*(\d{1,2})月?\s*[~\-\u2014]\s*(\d{4})年\s*(\d{1,2})月?/);if(m)return[m[1]+"-"+m[2].padStart(2,"0"),m[3]+"-"+m[4].padStart(2,"0")];m=r.match(/(\d{4})年\s*(\d{1,2})月?\s*[~\-\u2014]\s*(\d{1,2})月?/);if(m)return[m[1]+"-"+m[2].padStart(2,"0"),m[1]+"-"+m[3].padStart(2,"0")];m=r.match(/(\d{4})(\d{2})\s*[~\-\u2014]\s*(\d{4})(\d{2})/);if(m)return[m[1]+"-"+m[2],m[3]+"-"+m[4]];m=r.match(/(\d{4})[.](\d{2})[~\-](\d{4})[.](\d{2})/);if(m)return[m[1]+"-"+m[2],m[3]+"-"+m[4]];m=r.match(/(\d{4})(\d{2})/);if(m)return[m[1]+"-"+m[2],m[1]+"-"+m[2]];return["",""]}
function sF(r,f,v){
  if(f==="_ad"){var p=pA(v);if(p.c)r.cm=p.c;if(p.u)r.un=p.u;if(p.n)r.nm=p.n}

  else if(RT==="pie")chart=fmtPie(w,h,data);
  else chart=fmtHBar(w,h,data);
  document.getElementById("mainChart").innerHTML=chart;
  document.getElementById("chartTable").innerHTML=fmtTable(data,total);
  document.getElementById("st1").textContent="¥"+y2(total);
  document.getElementById("st2").textContent=frs.length;
  document.getElementById("st3").textContent=new Set(frs.map(function(r){return r.un})).size;
  document.querySelectorAll('[data-rd]').forEach(function(e){e.className="chip"+(e.dataset.rd===RD?" active":"")});
  document.querySelectorAll('[data-rt]').forEach(function(e){e.className="chip"+(e.dataset.rt===RT?" active":"")});
  document.querySelectorAll('[data-ry]').forEach(function(e){e.className="chip"+(e.dataset.ry===RY?" active":"")});
}
